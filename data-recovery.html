<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Recovery Tool - v2.0.7</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .status-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        
        .status-box.success {
            border-left-color: #28a745;
            background: #f8fff9;
        }
        
        .status-box.warning {
            border-left-color: #ffc107;
            background: #fffbf0;
        }
        
        .status-box.error {
            border-left-color: #dc3545;
            background: #fff8f8;
        }
        
        .status-box h3 {
            margin-bottom: 10px;
            color: #1e3c72;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: #6c757d;
        }
        
        .btn-success {
            background: #28a745;
        }
        
        .btn-danger {
            background: #dc3545;
        }
        
        textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-top: 10px;
            resize: vertical;
        }
        
        .data-item {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }
        
        .data-item strong {
            color: #1e3c72;
        }
        
        .match-preview {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 14px;
        }
        
        #log {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }
        
        .log-entry {
            margin-bottom: 5px;
        }
        
        .log-success { color: #4ec9b0; }
        .log-error { color: #f48771; }
        .log-warning { color: #dcdcaa; }
        .log-info { color: #9cdcfe; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Data Recovery Tool</h1>
        <p class="subtitle">Football Prediction Game v2.0.7</p>
        
        <div id="statusContainer"></div>
        
        <div class="status-box">
            <h3>Recovery Steps</h3>
            <button class="btn" onclick="checkData()">1. Check Current Data</button>
            <button class="btn btn-secondary" onclick="exportData()">2. Export Backup</button>
            <button class="btn btn-success" onclick="restoreData()">3. Restore from Backup</button>
        </div>
        
        <div id="dataDisplay"></div>
        
        <div style="margin-top: 20px;">
            <h3 style="margin-bottom: 10px;">Import Backup Data (JSON)</h3>
            <textarea id="importData" placeholder="Paste your backup JSON here..."></textarea>
            <button class="btn btn-success" onclick="importBackup()" style="margin-top: 10px;">Import & Restore</button>
        </div>
        
        <div id="log"></div>
    </div>
    
    <script>
        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function checkData() {
            log('Checking localStorage for data...', 'info');
            
            const migrationDone = localStorage.getItem('firebaseMigrationDone');
            const localMatches = localStorage.getItem('matches');
            const localUsers = localStorage.getItem('users');
            const localPredictions = localStorage.getItem('predictions');
            const localPools = localStorage.getItem('pools');
            
            let html = '<div class="status-box">';
            html += '<h3>Data Status</h3>';
            
            // Migration status
            html += `<div class="data-item">`;
            html += `<strong>Migration Status:</strong> ${migrationDone ? '✅ Completed' : '⚠️ Not Started'}`;
            html += `</div>`;
            
            // Matches
            if (localMatches) {
                try {
                    const matches = JSON.parse(localMatches);
                    const withResults = matches.filter(m => m.homeScore !== undefined);
                    const withBob = matches.filter(m => m.bobPrediction);
                    
                    html += `<div class="data-item ${withResults.length > 0 || withBob.length > 0 ? 'status-box success' : ''}">`;
                    html += `<strong>Matches:</strong> ${matches.length} found<br>`;
                    html += `- ${withResults.length} with results<br>`;
                    html += `- ${withBob.length} with Bob predictions`;
                    
                    if (withResults.length > 0 || withBob.length > 0) {
                        html += `<div class="match-preview">`;
                        html += `<strong>Sample matches:</strong><br>`;
                        matches.slice(0, 3).forEach(m => {
                            if (m.homeScore !== undefined || m.bobPrediction) {
                                html += `${m.homeTeam} vs ${m.awayTeam}`;
                                if (m.homeScore !== undefined) {
                                    html += ` (${m.homeScore}-${m.awayScore})`;
                                }
                                if (m.bobPrediction) {
                                    html += ` [Bob: ${m.bobPrediction.homeScore}-${m.bobPrediction.awayScore}]`;
                                }
                                html += `<br>`;
                            }
                        });
                        html += `</div>`;
                    }
                    html += `</div>`;
                    
                    log(`Found ${matches.length} matches (${withResults.length} with results, ${withBob.length} with Bob predictions)`, 'success');
                } catch (e) {
                    html += `<div class="data-item status-box error"><strong>Matches:</strong> Error parsing data</div>`;
                    log('Error parsing matches: ' + e.message, 'error');
                }
            } else {
                html += `<div class="data-item status-box error"><strong>Matches:</strong> ❌ Not found</div>`;
                log('No matches found in localStorage', 'error');
            }
            
            // Other data
            html += `<div class="data-item">`;
            html += `<strong>Users:</strong> ${localUsers ? JSON.parse(localUsers).length : 0}<br>`;
            html += `<strong>Predictions:</strong> ${localPredictions ? JSON.parse(localPredictions).length : 0}<br>`;
            html += `<strong>Pools:</strong> ${localPools ? JSON.parse(localPools).length : 0}`;
            html += `</div>`;
            
            html += '</div>';
            
            document.getElementById('dataDisplay').innerHTML = html;
            log('Data check complete', 'success');
        }
        
        function exportData() {
            log('Exporting data...', 'info');
            
            const data = {
                matches: JSON.parse(localStorage.getItem('matches') || '[]'),
                users: JSON.parse(localStorage.getItem('users') || '[]'),
                predictions: JSON.parse(localStorage.getItem('predictions') || '[]'),
                pools: JSON.parse(localStorage.getItem('pools') || '[]'),
                exportDate: new Date().toISOString()
            };
            
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `football-game-backup-${Date.now()}.json`;
            a.click();
            
            log('Backup exported successfully', 'success');
            alert('✅ Backup file downloaded! Save it in a safe place.');
        }
        
        function importBackup() {
            const jsonText = document.getElementById('importData').value.trim();
            
            if (!jsonText) {
                alert('⚠️ Please paste your backup JSON first');
                return;
            }
            
            try {
                log('Parsing backup data...', 'info');
                const data = JSON.parse(jsonText);
                
                if (data.matches && Array.isArray(data.matches)) {
                    localStorage.setItem('matches', JSON.stringify(data.matches));
                    log(`Restored ${data.matches.length} matches`, 'success');
                }
                
                if (data.users && Array.isArray(data.users)) {
                    localStorage.setItem('users', JSON.stringify(data.users));
                    log(`Restored ${data.users.length} users`, 'success');
                }
                
                if (data.predictions && Array.isArray(data.predictions)) {
                    localStorage.setItem('predictions', JSON.stringify(data.predictions));
                    log(`Restored ${data.predictions.length} predictions`, 'success');
                }
                
                if (data.pools && Array.isArray(data.pools)) {
                    localStorage.setItem('pools', JSON.stringify(data.pools));
                    log(`Restored ${data.pools.length} pools`, 'success');
                }
                
                alert('✅ Data restored successfully!\n\nNow reload the main application to see your restored data.');
                log('Restore complete! Reload the main app.', 'success');
                
            } catch (e) {
                log('Error importing backup: ' + e.message, 'error');
                alert('❌ Error: Invalid JSON format. Please check your backup data.');
            }
        }
        
        function restoreData() {
            if (confirm('This will attempt to restore data from localStorage. Continue?')) {
                checkData();
                log('Data check initiated for restore', 'info');
            }
        }
        
        // Auto-check on load
        window.onload = () => {
            log('Data Recovery Tool loaded', 'success');
            checkData();
        };
    </script>
</body>
</html>
