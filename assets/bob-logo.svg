<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Robot Head -->
  <rect x="50" y="60" width="100" height="80" rx="10" fill="#3498db" stroke="#2c3e50" stroke-width="3"/>
  
  <!-- Antenna -->
  <line x1="100" y1="60" x2="100" y2="40" stroke="#2c3e50" stroke-width="3"/>
  <circle cx="100" cy="35" r="5" fill="#e74c3c"/>
  
  <!-- Eyes -->
  <circle cx="75" cy="85" r="8" fill="#fff"/>
  <circle cx="125" cy="85" r="8" fill="#fff"/>
  <circle cx="75" cy="85" r="4" fill="#2c3e50"/>
  <circle cx="125" cy="85" r="4" fill="#2c3e50"/>
  
  <!-- Smile -->
  <path d="M 70 110 Q 100 125 130 110" stroke="#2c3e50" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Body -->
  <rect x="60" y="140" width="80" height="50" rx="5" fill="#3498db" stroke="#2c3e50" stroke-width="3"/>
  
  <!-- IBM Badge -->
  <rect x="75" y="155" width="50" height="20" rx="3" fill="#fff"/>
  <text x="100" y="169" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50" text-anchor="middle">IBM</text>
  
  <!-- Arms -->
  <rect x="35" y="145" width="25" height="10" rx="5" fill="#3498db" stroke="#2c3e50" stroke-width="2"/>
  <rect x="140" y="145" width="25" height="10" rx="5" fill="#3498db" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- Hands -->
  <circle cx="35" cy="150" r="6" fill="#3498db" stroke="#2c3e50" stroke-width="2"/>
  <circle cx="165" cy="150" r="6" fill="#3498db" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- Sparkles (AI effect) -->
  <path d="M 30 70 L 32 75 L 37 77 L 32 79 L 30 84 L 28 79 L 23 77 L 28 75 Z" fill="#f39c12"/>
  <path d="M 170 90 L 172 95 L 177 97 L 172 99 L 170 104 L 168 99 L 163 97 L 168 95 Z" fill="#f39c12"/>
  <path d="M 100 25 L 102 30 L 107 32 L 102 34 L 100 39 L 98 34 L 93 32 L 98 30 Z" fill="#f39c12"/>
</svg>

