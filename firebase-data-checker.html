<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Data Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #1e3c72;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        
        .status-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        
        .status-box.success {
            border-left-color: #28a745;
            background: #f8fff9;
        }
        
        .status-box.error {
            border-left-color: #dc3545;
            background: #fff8f8;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn-success {
            background: #28a745;
        }
        
        .btn-danger {
            background: #dc3545;
        }
        
        pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .match-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }
        
        .match-card.has-result {
            border-left-color: #28a745;
        }
        
        .match-card.has-bob {
            border-left-color: #ffc107;
        }
        
        #loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Firebase Data Checker</h1>
        <p class="subtitle">Check what data exists in Firebase</p>
        
        <div id="loading">
            <div class="spinner"></div>
            <p>Connecting to Firebase...</p>
        </div>
        
        <div id="content" style="display: none;">
            <div class="status-box">
                <h3>Actions</h3>
                <button class="btn" onclick="checkAllData()">🔄 Refresh Data</button>
                <button class="btn btn-success" onclick="restoreToLocalStorage()">💾 Restore to localStorage</button>
                <button class="btn btn-danger" onclick="exportAllData()">📥 Export All Data</button>
            </div>
            
            <div id="results"></div>
        </div>
    </div>
    
    <script src="firebase-config.js"></script>
    <script>
        let firebaseData = {
            matches: [],
            users: [],
            predictions: [],
            pools: [],
            notifications: []
        };
        
        async function initFirebase() {
            try {
                if (typeof firebase === 'undefined') {
                    throw new Error('Firebase not loaded');
                }
                
                if (firebase.apps.length === 0) {
                    throw new Error('Firebase not initialized');
                }
                
                document.getElementById('loading').innerHTML = '<div class="spinner"></div><p>Loading data from Firebase...</p>';
                
                await checkAllData();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                
            } catch (error) {
                document.getElementById('loading').innerHTML = `
                    <div class="status-box error">
                        <h3>❌ Firebase Connection Error</h3>
                        <p>${error.message}</p>
                        <p style="margin-top: 10px;">Make sure firebase-config.js is properly configured.</p>
                    </div>
                `;
            }
        }
        
        async function checkAllData() {
            const results = document.getElementById('results');
            results.innerHTML = '<div class="spinner"></div><p>Loading...</p>';
            
            try {
                const db = firebase.database();
                
                // Load all data
                const [matchesSnap, usersSnap, predictionsSnap, poolsSnap, notificationsSnap] = await Promise.all([
                    db.ref('matches').once('value'),
                    db.ref('users').once('value'),
                    db.ref('predictions').once('value'),
                    db.ref('pools').once('value'),
                    db.ref('notifications').once('value')
                ]);
                
                firebaseData.matches = matchesSnap.val() || [];
                firebaseData.users = usersSnap.val() || [];
                firebaseData.predictions = predictionsSnap.val() || [];
                firebaseData.pools = poolsSnap.val() || [];
                firebaseData.notifications = notificationsSnap.val() || [];
                
                displayResults();
                
            } catch (error) {
                results.innerHTML = `
                    <div class="status-box error">
                        <h3>❌ Error Loading Data</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }
        
        function displayResults() {
            const results = document.getElementById('results');
            
            // Summary
            let html = '<div class="status-box success"><h3>📊 Data Summary</h3>';
            html += `<p><strong>Matches:</strong> ${firebaseData.matches.length}</p>`;
            html += `<p><strong>Users:</strong> ${firebaseData.users.length}</p>`;
            html += `<p><strong>Predictions:</strong> ${firebaseData.predictions.length}</p>`;
            html += `<p><strong>Pools:</strong> ${firebaseData.pools.length}</p>`;
            html += `<p><strong>Notifications:</strong> ${firebaseData.notifications.length}</p>`;
            html += '</div>';
            
            // Matches analysis
            if (firebaseData.matches.length > 0) {
                const matchesWithResults = firebaseData.matches.filter(m => m.homeScore !== undefined);
                const matchesWithBob = firebaseData.matches.filter(m => m.bobPrediction);
                
                html += `<div class="status-box ${matchesWithResults.length > 0 || matchesWithBob.length > 0 ? 'success' : ''}">`;
                html += '<h3>⚽ Matches Data</h3>';
                html += `<p><strong>Total Matches:</strong> ${firebaseData.matches.length}</p>`;
                html += `<p><strong>Matches with Results:</strong> ${matchesWithResults.length}</p>`;
                html += `<p><strong>Matches with Bob Predictions:</strong> ${matchesWithBob.length}</p>`;
                
                if (matchesWithResults.length > 0 || matchesWithBob.length > 0) {
                    html += '<h4 style="margin-top: 15px;">Sample Matches:</h4>';
                    
                    firebaseData.matches.slice(0, 10).forEach(match => {
                        if (match.homeScore !== undefined || match.bobPrediction) {
                            html += `<div class="match-card ${match.homeScore !== undefined ? 'has-result' : ''} ${match.bobPrediction ? 'has-bob' : ''}">`;
                            html += `<strong>Match ${match.id}:</strong> ${match.homeTeam} vs ${match.awayTeam}<br>`;
                            
                            if (match.homeScore !== undefined) {
                                html += `<span style="color: #28a745;">✅ Result: ${match.homeScore}-${match.awayScore}</span><br>`;
                            }
                            
                            if (match.bobPrediction) {
                                html += `<span style="color: #ffc107;">🤖 Bob: ${match.bobPrediction.homeScore}-${match.bobPrediction.awayScore}</span>`;
                            }
                            
                            html += '</div>';
                        }
                    });
                }
                
                html += '</div>';
            }
            
            // Raw data
            html += '<div class="status-box">';
            html += '<h3>📄 Raw Firebase Data</h3>';
            html += '<pre>' + JSON.stringify(firebaseData, null, 2) + '</pre>';
            html += '</div>';
            
            results.innerHTML = html;
        }
        
        function restoreToLocalStorage() {
            if (confirm('This will restore Firebase data to localStorage. Continue?')) {
                try {
                    if (firebaseData.matches.length > 0) {
                        localStorage.setItem('matches', JSON.stringify(firebaseData.matches));
                    }
                    if (firebaseData.users.length > 0) {
                        localStorage.setItem('users', JSON.stringify(firebaseData.users));
                    }
                    if (firebaseData.predictions.length > 0) {
                        localStorage.setItem('predictions', JSON.stringify(firebaseData.predictions));
                    }
                    if (firebaseData.pools.length > 0) {
                        localStorage.setItem('pools', JSON.stringify(firebaseData.pools));
                    }
                    
                    alert('✅ Data restored to localStorage!\n\nNow reload the main application (index.html) to see your data.');
                } catch (error) {
                    alert('❌ Error: ' + error.message);
                }
            }
        }
        
        function exportAllData() {
            const json = JSON.stringify(firebaseData, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `firebase-backup-${Date.now()}.json`;
            a.click();
            alert('✅ Firebase data exported!');
        }
        
        // Initialize on load
        window.onload = initFirebase;
    </script>
</body>
</html>
